/* ═══ UTILS ═══ */
function parseTime(s){const[h,m]=s.split(":").map(Number);return h*60+m}
function getDuration(s){return parseTime(s.end)-parseTime(s.start)}
function getNow(){const d=new Date();return{minutes:d.getHours()*60+d.getMinutes(),dateStr:d.toISOString().slice(0,10)}}
function isLive(s,n,dd){const f=FESTIVAL_DATES.includes(n.dateStr);if(f)return n.dateStr===dd&&n.minutes>=parseTime(s.start)&&n.minutes<parseTime(s.end);return n.minutes>=parseTime(s.start)&&n.minutes<parseTime(s.end)}
function isPast(s,n,dd){const f=FESTIVAL_DATES.includes(n.dateStr);if(f){if(n.dateStr>dd)return true;if(n.dateStr<dd)return false;return n.minutes>=parseTime(s.end)}return n.minutes>=parseTime(s.end)}
function sessionsOverlap(a,b){return parseTime(a.start)<parseTime(b.end)&&parseTime(b.start)<parseTime(a.end)}
function getAppUrl(){return window.location.origin+window.location.pathname}

/* ═══ GITHUB BACKEND ═══ */
const GH_CONFIG_KEY="nrf26_gh_config";
function getGHConfig(){try{return JSON.parse(localStorage.getItem(GH_CONFIG_KEY))||null}catch{return null}}
function setGHConfig(c){localStorage.setItem(GH_CONFIG_KEY,JSON.stringify(c))}

async function loadProgramFromGH(){
  const cfg=getGHConfig();
  if(!cfg)return null;
  try{
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/program.json`,{headers:{"Accept":"application/vnd.github.v3+json"}});
    if(!r.ok)return null;
    const d=await r.json();
    return JSON.parse(atob(d.content));
  }catch{return null}
}

async function saveProgramToGH(data){
  const cfg=getGHConfig();if(!cfg)throw new Error("GitHub nicht konfiguriert");
  /* Get current SHA if file exists */
  let sha=null;
  try{
    const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/program.json`,{headers:{"Authorization":`token ${cfg.token}`,"Accept":"application/vnd.github.v3+json"}});
    if(r.ok){const d=await r.json();sha=d.sha}
  }catch{}
  const body={message:"Programm-Update via Admin-Panel",content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),branch:"main"};
  if(sha)body.sha=sha;
  const r=await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/program.json`,{method:"PUT",headers:{"Authorization":`token ${cfg.token}`,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"},body:JSON.stringify(body)});
  if(!r.ok)throw new Error(`GitHub API Fehler: ${r.status}`);
  return true;
}

function shareSession(session,e){

/* ═══ PDF EXPORT ═══ */
function exportFavPDF(favSessions){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:"mm",format:"a4"});
  const W=210,H=297,M=16;
  const coral=[224,72,32],teal=[26,42,42],grey=[138,150,150];
  const stageColors={orange:[224,72,32],blue:[58,126,200],green:[42,138,106],yellow:[200,146,10],grey:[106,122,128],workshop1:[122,94,176],workshop2:[192,88,120],mainhall:[224,72,32]};

  /* Header */
  doc.setFillColor(...teal);doc.rect(0,0,W,38,"F");
  doc.setTextColor(255,255,255);doc.setFontSize(18);doc.setFont("helvetica","bold");
  doc.text("nextReality.festival 2026",M,16);
  doc.setFontSize(9);doc.setFont("helvetica","normal");doc.setTextColor(200,210,210);
  doc.text("18.\u201319. November 2026  \u00b7  Speicherstadt, Hamburg",M,23);
  doc.setFontSize(11);doc.setTextColor(255,255,255);doc.setFont("helvetica","bold");
  doc.text("Mein Tagesplan",M,33);

  let y=46;
  const pageCheck=(need)=>{if(y+need>H-M){doc.addPage();y=M;return true}return false};

  [0,1].forEach(day=>{
    const df=favSessions.filter(s=>s.day===day);
    if(!df.length)return;
    pageCheck(20);
    /* Day header */
    doc.setFillColor(...coral);doc.rect(M,y-1,W-M*2,7,"F");
    doc.setTextColor(255,255,255);doc.setFontSize(9);doc.setFont("helvetica","bold");
    doc.text(t.dayLabels[day].toUpperCase(),M+3,y+4);
    y+=12;

    df.forEach((s,i)=>{
      const stage=getStage(s.stage);const dur=getDuration(s);
      const sc=stageColors[s.stage]||coral;
      const blockH=Math.max(18,s.cancelled?14:14+Math.ceil(doc.splitTextToSize(s.desc||"",W-M*2-52).length*3.5));
      pageCheck(blockH+4);

      /* Time column */
      doc.setTextColor(...teal);doc.setFontSize(9);doc.setFont("helvetica","bold");
      doc.text(s.start,M,y+4);
      doc.setFontSize(7);doc.setFont("helvetica","normal");doc.setTextColor(...grey);
      doc.text(`${dur} min`,M,y+8);

      /* Color bar */
      doc.setFillColor(...sc);doc.rect(M+18,y,1.5,blockH-2,"F");

      /* Content */
      const cx=M+23;
      if(s.cancelled){
        doc.setTextColor(180,80,60);doc.setFontSize(7);doc.setFont("helvetica","bold");
        doc.text("CANCELLED",cx,y+4);
        doc.setTextColor(...grey);doc.setFontSize(9);doc.setFont("helvetica","normal");
        doc.text(s.title,cx+22,y+4);
      }else{
        doc.setTextColor(...teal);doc.setFontSize(9);doc.setFont("helvetica","bold");
        const titleLines=doc.splitTextToSize(s.title,W-M*2-24);
        doc.text(titleLines,cx,y+4);
        const ty=y+4+titleLines.length*4;
        doc.setFontSize(7.5);doc.setFont("helvetica","normal");doc.setTextColor(...grey);
        doc.text(`${s.speaker}  \u00b7  ${stage.name}  \u00b7  ${s.lang==="EN"?"\uD83C\uDDEC\uD83C\uDDE7":"\uD83C\uDDE9\uD83C\uDDEA"} ${s.format||""}`,cx,ty);
        if(s.desc){
          const descLines=doc.splitTextToSize(s.desc,W-M*2-24);
          doc.setFontSize(7);doc.setTextColor(120,130,130);
          doc.text(descLines.slice(0,3),cx,ty+4.5);
        }
      }
      y+=blockH+2;
    });
    y+=6;
  });

  /* Footer */
  const pgs=doc.getNumberOfPages();
  for(let p=1;p<=pgs;p++){
    doc.setPage(p);
    doc.setFontSize(7);doc.setTextColor(...grey);doc.setFont("helvetica","normal");
    doc.text("nextReality.Hamburg e.V.  \u00b7  nextrealityfestival.com",M,H-8);
    doc.text(`Seite ${p}/${pgs}`,W-M,H-8,{align:"right"});
  }

  doc.save("mein-nextreality-tagesplan.pdf");
}

function TimelineBar({sessions,now,dayDate,t}){const f=FESTIVAL_DATES.includes(now.dateStr);const isToday=f?now.dateStr===dayDate:true;const p=f&&now.dateStr>dayDate;if(!isToday&&!p)return null;const s=Math.min(...sessions.map(x=>parseTime(x.start)));const e=Math.max(...sessions.map(x=>parseTime(x.end)));const tot=e-s;if(tot<=0)return null;const pr=p?100:Math.max(0,Math.min(100,((now.minutes-s)/tot)*100));const fmt=m=>`${Math.floor(m/60)}:${String(m%60).padStart(2,"0")}`;return(<div style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace",marginBottom:4}}><span>{fmt(s)}</span><span style={{color:pr>=100?"var(--text-muted)":"var(--nr-coral)",fontWeight:600}}>{pr>=100?t.dayDone:fmt(now.minutes)}</span><span>{fmt(e)}</span></div><div style={{height:4,borderRadius:2,background:"var(--border)",overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,background:"var(--nr-coral)",width:`${pr}%`,transition:"width 1s"}}/></div></div>)}

  const[open,setOpen]=useState(false);const stage=getStage(session.stage);const live=isLive(session,now,dayDate);const past=isPast(session,now,dayDate);const flag=LANG_FLAG[session.lang]||"";const spk=getSpeakerBio(session.speaker);const dur=getDuration(session);const minH=compact?undefined:(pxPerMin?Math.max(72,dur*pxPerMin):undefined);const cancelled=session.cancelled;

function AdminPanel({sessions,onUpdate}){
  const[status,setStatus]=useState("");const[ghSetup,setGhSetup]=useState(!!getGHConfig());
  const[owner,setOwner]=useState("");const[repo,setRepo]=useState("");const[token,setToken]=useState("");
  const fileRef=useRef();

  function handleGHSave(){if(owner&&repo&&token){setGHConfig({owner,repo,token});setGhSetup(true);setStatus("GitHub konfiguriert!")}}

  async function handleUpload(e){
    const file=e.target.files[0];if(!file)return;setStatus("Lese Excel...");
    const buf=await file.arrayBuffer();const wb=XLSX.read(buf);const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{header:1});
    const hdr=rows[1]||rows[0]; /* row 0=hints, row 1=headers */
    const hdrIdx={};hdr.forEach((h,i)=>{hdrIdx[String(h).toLowerCase().trim()]=i});
    const parsed=[];
    for(let r=2;r<rows.length;r++){
      const row=rows[r];if(!row||!row[hdrIdx.id])continue;
      parsed.push({id:Number(row[hdrIdx.id]),day:Number(row[hdrIdx.day])-1,start:String(row[hdrIdx.start]),end:String(row[hdrIdx.end]),stage:String(row[hdrIdx.stage]),speaker:String(row[hdrIdx.speaker]||""),title:String(row[hdrIdx.title]||""),company:String(row[hdrIdx.company]||""),topic:String(row[hdrIdx.topic]||""),desc:String(row[hdrIdx.description]||""),lang:String(row[hdrIdx.language]||"DE"),format:String(row[hdrIdx.format]||"Talk"),time:`${row[hdrIdx.start]}\u2013${row[hdrIdx.end]}`});
    }
    if(!parsed.length){setStatus("Keine Sessions gefunden!");return}
    setStatus(`${parsed.length} Sessions geladen. Speichere...`);
    try{await saveProgramToGH({sessions:parsed,updated:new Date().toISOString()});onUpdate(parsed);setStatus(`\u2713 ${parsed.length} Sessions gespeichert!`)}catch(err){setStatus("Fehler: "+err.message)}
  }

  async function toggleCancel(id){
    const updated=sessions.map(s=>s.id===id?{...s,cancelled:!s.cancelled}:s);
    setStatus("Speichere...");
    try{await saveProgramToGH({sessions:updated,updated:new Date().toISOString()});onUpdate(updated);setStatus("\u2713 Gespeichert!")}catch(err){setStatus("Fehler: "+err.message)}
  }

  if(!ghSetup)return(
    <div style={{padding:20,maxWidth:500,margin:"20px auto"}}>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:16,color:"var(--nr-coral)"}}>Admin: GitHub Setup</h2>
      <p style={{fontSize:13,color:"var(--text-secondary)",marginBottom:16,lineHeight:1.6}}>Verbinde das Admin-Panel mit eurem GitHub-Repository, damit Programm-Updates direkt als <code style={{background:"var(--bg-teal-soft)",padding:"1px 4px",borderRadius:3}}>program.json</code> gespeichert werden.</p>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <input value={owner} onChange={e=>setOwner(e.target.value)} placeholder="GitHub Username / Org" style={{padding:"8px 12px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)",color:"var(--text-primary)",fontSize:13,fontFamily:"'IBM Plex Mono',monospace"}}/>
        <input value={repo} onChange={e=>setRepo(e.target.value)} placeholder="Repository Name" style={{padding:"8px 12px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)",color:"var(--text-primary)",fontSize:13,fontFamily:"'IBM Plex Mono',monospace"}}/>
        <input value={token} onChange={e=>setToken(e.target.value)} placeholder="Personal Access Token" type="password" style={{padding:"8px 12px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)",color:"var(--text-primary)",fontSize:13,fontFamily:"'IBM Plex Mono',monospace"}}/>
        <button onClick={handleGHSave} style={{padding:"10px 16px",borderRadius:8,border:"none",background:"var(--nr-coral)",color:"#fff",fontSize:13,fontWeight:600}}>Verbinden</button>
      </div>
    </div>
  );

  return(
    <div style={{padding:20,maxWidth:700,margin:"20px auto"}}>
      <h2 style={{fontSize:18,fontWeight:700,marginBottom:4,color:"var(--nr-coral)"}}>Admin Panel</h2>
      <p style={{fontSize:11,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace",marginBottom:16}}>Eingeloggt &middot; {getGHConfig()?.owner}/{getGHConfig()?.repo} <button onClick={()=>{localStorage.removeItem(GH_CONFIG_KEY);setGhSetup(false)}} style={{fontSize:10,color:"var(--text-muted)",background:"none",border:"none",textDecoration:"underline",marginLeft:8}}>Trennen</button></p>
      
      {/* Upload */}
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:16,marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Programm-Update hochladen</h3>
        <p style={{fontSize:12,color:"var(--text-secondary)",marginBottom:10}}>Excel-Tabelle (nrf26_programm.xlsx) hier hochladen. Die Sessions werden direkt ins Repository geschrieben.</p>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleUpload} style={{fontSize:12}}/>
      </div>

      {/* Cancel toggles */}
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:12,padding:16}}>
        <h3 style={{fontSize:14,fontWeight:600,marginBottom:8}}>Sessions verwalten</h3>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {sessions.map(s=>(
            <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,background:s.cancelled?"rgba(192,57,43,.06)":"transparent"}}>
              <button onClick={()=>toggleCancel(s.id)} style={{width:20,height:20,borderRadius:4,border:s.cancelled?"2px solid #c0392b":"2px solid var(--border)",background:s.cancelled?"#c0392b":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,padding:0}}>
                {s.cancelled&&<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
              </button>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontSize:12,fontWeight:500,color:s.cancelled?"var(--text-muted)":"var(--text-primary)",textDecoration:s.cancelled?"line-through":"none"}}>{s.title}</span>
                <span style={{fontSize:10,color:"var(--text-muted)",marginLeft:6}}>Tag {s.day+1} &middot; {s.time}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {status&&<div style={{marginTop:12,padding:"8px 12px",borderRadius:8,background:"var(--bg-teal-soft)",fontSize:12,color:"var(--text-secondary)"}}>{status}</div>}
    </div>
  );
}

  const[sessions,setSessions]=useState(DEFAULT_SESSIONS);
  const[dataLoaded,setDataLoaded]=useState(false);

  /* Check for admin mode */
  const params=new URLSearchParams(window.location.search);
  const isAdmin=params.has("admin");

  /* Load program.json from GitHub on mount */
  useEffect(()=>{
    loadProgramFromGH().then(data=>{
      if(data&&data.sessions&&data.sessions.length>0)setSessions(data.sessions);
      setDataLoaded(true);
    }).catch(()=>setDataLoaded(true));
  },[]);

  /* Deep-link to session on hash */
  useEffect(()=>{
    if(window.location.hash){const el=document.querySelector(window.location.hash);if(el)setTimeout(()=>el.scrollIntoView({behavior:"smooth",block:"center"}),500)}
  },[dataLoaded]);

  useEffect(()=>{const i=setInterval(()=>setNow(getNow()),15000);return()=>clearInterval(i)},[]);
  useEffect(()=>{try{localStorage.setItem("nrf26_favs",JSON.stringify(favs))}catch{}},[favs]);
  const toggleFav=useCallback(id=>{setFavs(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id])},[]);
  const daySessions=useMemo(()=>sessions.filter(s=>s.day===activeDay),[activeDay,sessions]);
  const dayStages=useMemo(()=>{const ids=[...new Set(daySessions.map(s=>s.stage))];return STAGES.filter(s=>ids.includes(s.id))},[daySessions]);
  const filtered=useMemo(()=>{let l=daySessions;if(activeStage!=="all")l=l.filter(s=>s.stage===activeStage);return l},[daySessions,activeStage]);
  const favSessions=useMemo(()=>sessions.filter(s=>favs.includes(s.id)).sort((a,b)=>a.day-b.day||parseTime(a.start)-parseTime(b.start)),[favs,sessions]);
  const liveSession=useMemo(()=>daySessions.find(s=>isLive(s,now,FESTIVAL_DATES[activeDay])&&!s.cancelled),[now,activeDay,daySessions]);
  const isDemoMode=!FESTIVAL_DATES.includes(now.dateStr);
  const pxPerMin=bp==="desktop"?3.5:4;

  const favConflicts=useMemo(()=>{const c=[];for(let i=0;i<favSessions.length;i++)for(let j=i+1;j<favSessions.length;j++)if(favSessions[i].day===favSessions[j].day&&favSessions[i].stage!==favSessions[j].stage&&sessionsOverlap(favSessions[i],favSessions[j]))c.push([favSessions[i],favSessions[j]]);return c},[favSessions]);

  const touchRef=useRef({x:0,y:0});
  const onTS=e=>{touchRef.current={x:e.touches[0].clientX,y:e.touches[0].clientY}};
  const onTE=e=>{const dx=e.changedTouches[0].clientX-touchRef.current.x;const dy=e.changedTouches[0].clientY-touchRef.current.y;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5&&tab==="schedule"&&!isWide){const ids=["all",...dayStages.map(s=>s.id)];const i=ids.indexOf(activeStage);if(dx<0&&i<ids.length-1)setActiveStage(ids[i+1]);if(dx>0&&i>0)setActiveStage(ids[i-1])}};
  const pad=isWide?{padding:"0 32px"}:{padding:"0 16px"};
  const maxW=bp==="desktop"?1200:bp==="tablet"?800:520;
  const logoH=bp==="desktop"?52:bp==="tablet"?46:38;
  const heroH=bp==="desktop"?220:bp==="tablet"?180:140;
  const heroSrc=theme.effective==="dark"?HERO_DARK:HERO_LIGHT;

  if(isAdmin)return(<div style={{minHeight:"100dvh",display:"flex",flexDirection:"column"}}><header style={{background:"var(--bg-header)",padding:"16px 20px"}}><div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{display:"flex",alignItems:"center",gap:12}}><img src={LOGO_SRC} alt="Logo" style={{height:32}}/><span style={{color:"#fff",fontSize:13,fontWeight:600}}>Admin</span></div><ThemeToggle mode={theme.mode} effective={theme.effective} onCycle={theme.cycle}/></div></header><main style={{flex:1}}><AdminPanel sessions={sessions} onUpdate={s=>setSessions(s)}/></main></div>);

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100dvh",transition:"background .3s"}}>
      <header style={{background:"var(--bg-header)",position:"relative",overflow:"hidden",transition:"background .3s",paddingTop:"env(safe-area-inset-top,0px)"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:heroH,backgroundImage:`url(${heroSrc})`,backgroundSize:"cover",backgroundPosition:"center 30%",opacity:"var(--hero-opacity)",transition:"opacity .5s"}}/>
        <div style={{position:"absolute",top:0,left:0,right:0,height:heroH,background:"var(--hero-overlay)",transition:"background .5s"}}/>
        <div style={{position:"relative",zIndex:1,maxWidth:maxW,margin:"0 auto",width:"100%",padding:isWide?"0 32px":"0 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:isWide?20:14,paddingBottom:8}}>
            <a href="https://nextrealityfestival.com" target="_blank" rel="noopener" style={{display:"block",lineHeight:0}}><img src={LOGO_SRC} alt="nextReality.festival Hamburg" style={{height:logoH,width:"auto",display:"block"}}/></a>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {isDemoMode&&<span style={{fontSize:9,fontWeight:600,color:"var(--nr-coral-vivid)",border:"1px solid rgba(255,82,40,.4)",padding:"3px 7px",borderRadius:4,fontFamily:"'IBM Plex Mono',monospace",backdropFilter:"blur(4px)"}}>DEMO</span>}
              <button onClick={()=>setLang(lang==="de"?"en":"de")} style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.12)",borderRadius:20,padding:"4px 10px",fontSize:11,fontWeight:500,color:"rgba(255,255,255,.65)",fontFamily:"'IBM Plex Mono',monospace",backdropFilter:"blur(4px)",WebkitBackdropFilter:"blur(4px)"}}>{lang==="de"?"\u{1F1EC}\u{1F1E7} EN":"\u{1F1E9}\u{1F1EA} DE"}</button>
              <ThemeToggle mode={theme.mode} effective={theme.effective} onCycle={theme.cycle}/>
            </div>
          </div>
          <div style={{paddingBottom:isWide?16:12,paddingTop:isWide?8:4}}><div style={{fontSize:isWide?13:11,color:"rgba(255,255,255,.5)",fontFamily:"'IBM Plex Mono',monospace"}}>18.–19. November 2026 · Speicherstadt, Hamburg</div></div>
          <div style={{display:"flex",gap:isWide?32:0}}>
            {[{id:"schedule",label:t.program},{id:"favorites",label:`${t.favorites}${favs.length?` (${favs.length})`:""}`},{id:"venue",label:t.venue}].map(tb=>(
              <button key={tb.id} onClick={()=>setTab(tb.id)} style={{flex:isWide?"none":"1",padding:isWide?"10px 0 14px":"10px 0 12px",background:"none",border:"none",fontSize:13,fontWeight:tab===tb.id?600:400,color:tab===tb.id?"#fff":"rgba(255,255,255,.3)",borderBottom:tab===tb.id?"2px solid var(--nr-coral-vivid)":"2px solid transparent"}}>{tb.label}</button>
            ))}
          </div>
        </div>
      </header>

      <main style={{flex:1,paddingBottom:`calc(20px + env(safe-area-inset-bottom,0px))`}} onTouchStart={onTS} onTouchEnd={onTE}>
        <div style={{maxWidth:maxW,margin:"0 auto",width:"100%",...pad}}>
          {tab==="schedule"?(
            <>
              <div style={{display:"flex",gap:8,paddingTop:isWide?20:14,paddingBottom:isWide?4:2}}>
                {DAY_LABELS.map((l,i)=>(<button key={i} onClick={()=>{setActiveDay(i);setActiveStage("all")}} style={{flex:bp==="mobile"?1:"none",padding:isWide?"10px 20px":"10px 10px",borderRadius:8,textAlign:"left",border:activeDay===i?"1.5px solid var(--nr-coral)":"1px solid var(--border)",background:activeDay===i?"var(--nr-coral-soft)":"var(--bg-card)"}}><div style={{fontSize:10,fontWeight:600,fontFamily:"'IBM Plex Mono',monospace",color:activeDay===i?"var(--nr-coral)":"var(--text-muted)",marginBottom:2,textTransform:"uppercase"}}>{t.day} {i+1}</div><div style={{fontSize:13,fontWeight:activeDay===i?600:400,color:activeDay===i?"var(--text-primary)":"var(--text-secondary)"}}>{bp==="mobile"?t.dayShort[i]:t.dayLabels[i]}</div></button>))}
              </div>
              {bp!=="desktop"&&<div style={{paddingTop:10}}><StagePills stages={dayStages} active={activeStage} onSelect={setActiveStage}/></div>}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>{bp==="mobile"&&dayStages.length>1?<div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace"}}>← wische →</div>:<div/>}<button onClick={()=>setHidePast(!hidePast)} style={{fontSize:11,fontWeight:500,color:hidePast?"var(--nr-coral)":"var(--text-muted)",background:hidePast?"var(--nr-coral-soft)":"transparent",border:hidePast?"1px solid var(--nr-coral-mid)":"1px solid var(--border)",borderRadius:16,padding:"4px 10px",whiteSpace:"nowrap"}}>{hidePast?t.hidePastActive:t.hidePast}</button></div>
              <TimelineBar sessions={daySessions} now={now} t={t} dayDate={FESTIVAL_DATES[activeDay]}/>
              <LiveBanner sessions={activeStage==="all"?daySessions:daySessions.filter(s=>s.stage===activeStage)} now={now} dayDate={FESTIVAL_DATES[activeDay]} t={t}/>
              {bp==="desktop"?(<div style={{display:"flex",gap:16,paddingTop:4,alignItems:"flex-start",flexWrap:"wrap"}}>{dayStages.map(st=>(<StageColumn key={st.id} stage={st} sessions={daySessions.filter(s=>s.stage===st.id)} dayDate={FESTIVAL_DATES[activeDay]} now={now} favs={favs} onToggleFav={toggleFav} hidePast={hidePast} pxPerMin={pxPerMin} t={t}/>))}</div>
              ):bp==="tablet"?(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{filtered.map((s,i)=>(<div key={s.id} style={{animation:`fade-in .3s ease ${i*.04}s both`}}><SessionCard session={s} dayDate={FESTIVAL_DATES[activeDay]} now={now} isFav={favs.includes(s.id)} onToggleFav={toggleFav} hidePast={hidePast} pxPerMin={pxPerMin} t={t}/></div>))}{filtered.filter(s=>!hidePast||!isPast(s,now,FESTIVAL_DATES[activeDay])).length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"48px 20px",color:"var(--text-muted)"}}>{t.noSessions}</div>}</div>
              ):(<div style={{display:"flex",flexDirection:"column",gap:8}}>{filtered.map((s,i)=>(<div key={s.id} style={{animation:`fade-in .3s ease ${i*.04}s both`}}><SessionCard session={s} dayDate={FESTIVAL_DATES[activeDay]} now={now} isFav={favs.includes(s.id)} onToggleFav={toggleFav} hidePast={hidePast} pxPerMin={pxPerMin} t={t}/></div>))}{filtered.filter(s=>!hidePast||!isPast(s,now,FESTIVAL_DATES[activeDay])).length===0&&<div style={{textAlign:"center",padding:"48px 20px",color:"var(--text-muted)"}}>{t.noSessions}</div>}</div>)}
            </>
          ):tab==="favorites"?(
            <div style={{paddingTop:isWide?20:14}}>
              {/* View toggle + PDF export */}
              {favSessions.length>0&&<div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
                {[{id:"list",label:t.list},{id:"timeline",label:t.timeline}].map(v=>(<button key={v.id} onClick={()=>setFavView(v.id)} style={{padding:"5px 12px",borderRadius:16,fontSize:11,fontWeight:500,border:"1px solid",background:favView===v.id?"var(--nr-coral-soft)":"transparent",color:favView===v.id?"var(--nr-coral)":"var(--text-muted)",borderColor:favView===v.id?"var(--nr-coral-mid)":"var(--border)"}}>{v.label}</button>))}
                <div style={{flex:1}}/>
                <button onClick={()=>exportFavPDF(favSessions)} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:16,fontSize:11,fontWeight:500,border:"1px solid var(--border)",background:"var(--bg-teal-soft)",color:"var(--text-secondary)"}}><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>PDF</button>
              </div>}
              {favConflicts.length>0&&<ConflictWarning conflicts={favConflicts} t={t}/>}
              {favSessions.length===0?(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-muted)"}}><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--border-strong)" strokeWidth="1.2" style={{marginBottom:12}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div style={{fontSize:15,fontWeight:600,color:"var(--text-secondary)",marginBottom:4}}>{t.noFavs}</div><div style={{fontSize:13}}>{t.noFavsHint}</div></div>
              ):favView==="timeline"?(
                /* Timeline view: shows slots chronologically with time markers */
                [0,1].map(day=>{const df=favSessions.filter(s=>s.day===day);if(!df.length)return null;return(
                  <div key={day} style={{marginBottom:20}}>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--nr-coral)",textTransform:"uppercase",letterSpacing:".07em",fontFamily:"'IBM Plex Mono',monospace",marginBottom:12}}>{t.dayLabels[day]}</div>
                    {df.map((s,i)=>{const stage=getStage(s.stage);const dur=getDuration(s);return(
                      <div key={s.id} style={{display:"flex",gap:12,marginBottom:8}}>
                        <div style={{width:50,textAlign:"right",flexShrink:0,paddingTop:4}}>
                          <div style={{fontSize:12,fontWeight:600,color:"var(--text-primary)",fontFamily:"'IBM Plex Mono',monospace"}}>{s.start}</div>
                          <div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace"}}>{dur}m</div>
                        </div>
                        <div style={{width:3,background:stage.color,borderRadius:2,flexShrink:0}}/>
                        <div style={{flex:1,background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:8,padding:"8px 12px"}}>
                          <div style={{fontSize:13,fontWeight:600,color:"var(--text-primary)"}}>{s.title}</div>
                          <div style={{fontSize:11,color:"var(--text-secondary)",marginTop:2}}>{s.speaker} &middot; <span style={{color:stage.color}}>{stage.name}</span></div>
                        </div>
                      </div>
                    )})}
                  </div>
                )})
              ):(
                /* List view */
                [0,1].map(day=>{const df=favSessions.filter(s=>s.day===day);if(!df.length)return null;return(
                  <div key={day}><div style={{fontSize:11,fontWeight:600,color:"var(--nr-coral)",textTransform:"uppercase",letterSpacing:".07em",fontFamily:"'IBM Plex Mono',monospace",margin:day?"20px 0 10px":"0 0 10px"}}>{t.dayLabels[day]}</div>
                  <div style={{display:isWide?"grid":"flex",gridTemplateColumns:bp==="desktop"?"1fr 1fr 1fr":"1fr 1fr",gap:isWide?10:8,flexDirection:"column"}}>{df.map(s=><SessionCard key={s.id} session={s} dayDate={FESTIVAL_DATES[day]} now={now} isFav onToggleFav={toggleFav} compact={isWide} t={t}/>)}</div></div>
                )})
              )}
            </div>
          ):tab==="venue"?(
            /* VENUE MAP */
            <VenueMap bp={bp} isWide={isWide} t={t} onStageClick={(stageId)=>{setTab("schedule");setActiveStage(stageId)}}/>
          ):null}
        </div>
      </main>
      <footer style={{textAlign:"center",padding:isWide?"20px 32px":"14px 16px calc(6px + env(safe-area-inset-bottom,0px))",borderTop:"1px solid var(--border)",fontSize:11,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace",background:"var(--bg-warm)"}}><span>nextReality.Hamburg e.V.</span><span style={{margin:"0 6px",opacity:.4}}>&middot;</span><span>Sandtorkai 27/28</span><span style={{margin:"0 6px",opacity:.4}}>&middot;</span><a href="https://nextrealityfestival.com" target="_blank" rel="noopener" style={{color:"var(--nr-coral)",textDecoration:"none"}}>nextrealityfestival.com</a></footer>
      <style>{`button:active{opacity:.8}`}</style>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
