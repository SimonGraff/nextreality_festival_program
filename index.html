<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --bg:#f4f0eb;--bg-warm:#efe9e1;--bg-card:#ffffff;
  --bg-header:#1a2828;--bg-teal-soft:rgba(26,42,42,.06);
  --text-primary:#1a2a2a;--text-secondary:#5a6868;--text-muted:#8a9696;--text-on-header:#f4f0eb;
  --nr-coral:#e04820;--nr-coral-soft:rgba(224,72,32,.08);--nr-coral-mid:rgba(224,72,32,.15);--nr-coral-vivid:#ff5228;
  --stage-orange:#e04820;--stage-orange-bg:rgba(224,72,32,.08);
  --stage-blue:#3a7ec8;--stage-blue-bg:rgba(58,126,200,.08);
  --stage-green:#2a8a6a;--stage-green-bg:rgba(42,138,106,.08);
  --stage-yellow:#c8920a;--stage-yellow-bg:rgba(200,146,10,.08);
  --stage-grey:#6a7a80;--stage-grey-bg:rgba(106,122,128,.08);
  --stage-purple:#7a5eb0;--stage-purple-bg:rgba(122,94,176,.08);
  --stage-pink:#c05878;--stage-pink-bg:rgba(192,88,120,.08);
  --border:rgba(26,42,42,.08);--border-strong:rgba(26,42,42,.14);
  --shadow-sm:0 1px 3px rgba(26,42,42,.06);--shadow-live:0 2px 12px rgba(224,72,32,.1);
  --hero-overlay:linear-gradient(180deg, rgba(26,40,40,.15) 0%, rgba(26,40,40,.6) 55%, rgba(26,40,40,.95) 100%);
  --hero-opacity:.75;
}
[data-theme="dark"]{
  --bg:#0e1414;--bg-warm:#121a1a;--bg-card:#1a2222;
  --bg-header:#080c0c;--bg-teal-soft:rgba(200,220,220,.06);
  --text-primary:#e8e4df;--text-secondary:#8a9696;--text-muted:#5a6666;--text-on-header:#e8e4df;
  --nr-coral:#ff5c30;--nr-coral-soft:rgba(255,92,48,.10);--nr-coral-mid:rgba(255,92,48,.18);--nr-coral-vivid:#ff6840;
  --stage-orange:#ff5c30;--stage-orange-bg:rgba(255,92,48,.10);
  --stage-blue:#5a9eee;--stage-blue-bg:rgba(90,158,238,.10);
  --stage-green:#3aba8a;--stage-green-bg:rgba(58,186,138,.10);
  --stage-yellow:#e0a820;--stage-yellow-bg:rgba(224,168,32,.10);
  --stage-grey:#8a9aa0;--stage-grey-bg:rgba(138,154,160,.10);
  --stage-purple:#9a7ed0;--stage-purple-bg:rgba(154,126,208,.10);
  --stage-pink:#e06898;--stage-pink-bg:rgba(224,104,152,.10);
  --border:rgba(255,255,255,.07);--border-strong:rgba(255,255,255,.12);
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-live:0 2px 12px rgba(255,92,48,.15);
  --hero-overlay:linear-gradient(180deg, rgba(8,12,12,.2) 0%, rgba(8,12,12,.75) 55%, rgba(8,12,12,1) 100%);
  --hero-opacity:.6;
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]):not([data-theme="dark"]){
    --bg:#0e1414;--bg-warm:#121a1a;--bg-card:#1a2222;
    --bg-header:#080c0c;--bg-teal-soft:rgba(200,220,220,.06);
    --text-primary:#e8e4df;--text-secondary:#8a9696;--text-muted:#5a6666;--text-on-header:#e8e4df;
    --nr-coral:#ff5c30;--nr-coral-soft:rgba(255,92,48,.10);--nr-coral-mid:rgba(255,92,48,.18);--nr-coral-vivid:#ff6840;
    --stage-orange:#ff5c30;--stage-orange-bg:rgba(255,92,48,.10);
    --stage-blue:#5a9eee;--stage-blue-bg:rgba(90,158,238,.10);
    --stage-green:#3aba8a;--stage-green-bg:rgba(58,186,138,.10);
    --stage-yellow:#e0a820;--stage-yellow-bg:rgba(224,168,32,.10);
    --stage-grey:#8a9aa0;--stage-grey-bg:rgba(138,154,160,.10);
    --stage-purple:#9a7ed0;--stage-purple-bg:rgba(154,126,208,.10);
    --stage-pink:#e06898;--stage-pink-bg:rgba(224,104,152,.10);
    --border:rgba(255,255,255,.07);--border-strong:rgba(255,255,255,.12);
    --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-live:0 2px 12px rgba(255,92,48,.15);
    --hero-overlay:linear-gradient(180deg, rgba(8,12,12,.2) 0%, rgba(8,12,12,.75) 55%, rgba(8,12,12,1) 100%);
    --hero-opacity:.6;
  }
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
#root{min-height:100dvh;display:flex;flex-direction:column}
button{font-family:'DM Sans',system-ui,sans-serif;cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:4px}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

function parseTime(s){const[h,m]=s.split(":").map(Number);return h*60+m}
function getNow(){const d=new Date();return{minutes:d.getHours()*60+d.getMinutes(),dateStr:d.toISOString().slice(0,10)}}
function isLive(s,n,dd){return n.dateStr===dd&&n.minutes>=parseTime(s.start)&&n.minutes<parseTime(s.end)}
function isPast(s,n,dd){if(n.dateStr>dd)return true;if(n.dateStr<dd)return false;return n.minutes>=parseTime(s.end)}

function useBreakpoint(){
  const[bp,setBp]=useState(()=>window.innerWidth>=1080?"desktop":window.innerWidth>=700?"tablet":"mobile");
  useEffect(()=>{const h=()=>setBp(window.innerWidth>=1080?"desktop":window.innerWidth>=700?"tablet":"mobile");window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h)},[]);
  return bp;
}
function useTheme(){
  const[mode,setMode]=useState(()=>{try{return localStorage.getItem("nrf26_theme")||"auto"}catch{return"auto"}});
  const apply=useCallback(m=>{setMode(m);try{localStorage.setItem("nrf26_theme",m)}catch{};if(m==="auto")document.documentElement.removeAttribute("data-theme");else document.documentElement.setAttribute("data-theme",m)},[]);
  useEffect(()=>{if(mode==="auto")document.documentElement.removeAttribute("data-theme");else document.documentElement.setAttribute("data-theme",mode)},[mode]);
  const cycle=useCallback(()=>{apply(mode==="auto"?"dark":mode==="dark"?"light":"auto")},[mode,apply]);
  const effective=useMemo(()=>{if(mode!=="auto")return mode;if(typeof window!=="undefined"&&window.matchMedia)return window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";return"light"},[mode]);
  return{mode,effective,cycle};
}

const ChevronIcon=({open,size=16})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{transition:"transform .2s ease",transform:open?"rotate(180deg)":"none"}}><polyline points="6 9 12 15 18 9"/></svg>);

    style={{display:"inline-flex",alignItems:"center",gap:5,background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.12)",borderRadius:20,padding:"4px 10px 4px 7px",fontSize:11,fontWeight:500,color:"rgba(255,255,255,.65)",fontFamily:"'IBM Plex Mono',monospace",transition:"all .2s ease",backdropFilter:"blur(4px)",WebkitBackdropFilter:"blur(4px)"}}>
    {effective==="dark"
      ?<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      :<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>}

  </button>);
}

}

function StageColumn({stage,sessions,dayDate,now,favs,onToggleFav}){
  return(<div style={{flex:"1 1 0",minWidth:240,maxWidth:360}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"0 2px"}}>
      <div style={{width:10,height:10,borderRadius:3,background:stage.color,flexShrink:0}}/>

      <span style={{fontSize:11,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace"}}>{sessions.length}</span>

      {sessions.map((s,i)=>(<div key={s.id} style={{animation:`fade-in .3s ease ${i*.05}s both`}}><SessionCard session={s} dayDate={dayDate} now={now} isFav={favs.includes(s.id)} onToggleFav={onToggleFav} compact/></div>))}

function App(){

  const[now,setNow]=useState(getNow);
  useEffect(()=>{const i=setInterval(()=>setNow(getNow()),30000);return()=>clearInterval(i)},[]);
  useEffect(()=>{try{localStorage.setItem("nrf26_favs",JSON.stringify(favs))}catch{}},[favs]);
  const toggleFav=useCallback(id=>{setFavs(f=>f.includes(id)?f.filter(x=>x!==id):[...f,id])},[]);

  const dayStages=useMemo(()=>{const ids=[...new Set(daySessions.map(s=>s.stage))];return STAGES.filter(s=>ids.includes(s.id))},[daySessions]);
  const filtered=useMemo(()=>{let l=daySessions;if(activeStage!=="all")l=l.filter(s=>s.stage===activeStage);return l},[daySessions,activeStage]);
  const favSessions=useMemo(()=>SESSIONS.filter(s=>favs.includes(s.id)).sort((a,b)=>a.day-b.day||parseTime(a.start)-parseTime(b.start)),[favs]);

                  {filtered.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"48px 20px",color:"var(--text-muted)",fontSize:14}}>Keine Sessions auf dieser Stage.</div>}
                </div>

                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {filtered.map((s,i)=>(<div key={s.id} style={{animation:`fade-in .3s ease ${i*.04}s both`}}><SessionCard session={s} dayDate={FESTIVAL_DATES[activeDay]} now={now} isFav={favs.includes(s.id)} onToggleFav={toggleFav}/></div>))}
                  {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 20px",color:"var(--text-muted)",fontSize:14}}>Keine Sessions auf dieser Stage.</div>}
                </div>
              )}
            </>
          ):(
            <div style={{paddingTop:isWide?20:14}}>
              {favSessions.length===0?(
                <div style={{textAlign:"center",padding:"60px 20px",color:"var(--text-muted)"}}>
                  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--border-strong)" strokeWidth="1.2" style={{marginBottom:12}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  <div style={{fontSize:15,fontWeight:600,color:"var(--text-secondary)",marginBottom:4}}>Noch keine Favoriten</div>
                  <div style={{fontSize:13,color:"var(--text-muted)"}}>Tippe auf den Stern bei einer Session.</div>
                </div>
              ):(
                [0,1].map(day=>{const df=favSessions.filter(s=>s.day===day);if(!df.length)return null;return(
                  <div key={day}>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--nr-coral)",textTransform:"uppercase",letterSpacing:".07em",fontFamily:"'IBM Plex Mono',monospace",margin:day?"20px 0 10px":"0 0 10px"}}>{DAY_LABELS[day]}</div>
                    <div style={{display:isWide?"grid":"flex",gridTemplateColumns:bp==="desktop"?"1fr 1fr 1fr":"1fr 1fr",gap:isWide?10:8,flexDirection:"column"}}>
                      {df.map(s=><SessionCard key={s.id} session={s} dayDate={FESTIVAL_DATES[day]} now={now} isFav onToggleFav={toggleFav} compact={isWide}/>)}
                    </div>
                  </div>
                )})
              )}
            </div>
          )}
        </div>
      </main>

      <footer style={{textAlign:"center",padding:isWide?"20px 32px":"14px 16px calc(6px + env(safe-area-inset-bottom,0px))",borderTop:"1px solid var(--border)",fontSize:11,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace",background:"var(--bg-warm)",transition:"background .3s"}}>
        <span>nextReality.Hamburg e.V.</span><span style={{margin:"0 6px",opacity:.4}}>&middot;</span>
        <span>Sandtorkai 27/28, Speicherstadt</span><span style={{margin:"0 6px",opacity:.4}}>&middot;</span>
        <a href="https://nextrealityfestival.com" target="_blank" rel="noopener" style={{color:"var(--nr-coral)",textDecoration:"none"}}>nextrealityfestival.com</a>
      </footer>
      <style>{`button:active{opacity:.8}`}</style>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
